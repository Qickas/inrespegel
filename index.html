<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--gold-light:#e8d5a3;--white:#f0ece4;--dark:#07070f;--dark2:#0e0e1c;--dark3:#141428}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--white);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:rgba(7,7,15,0.88);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.1)}
.logo{font-family:'Cormorant Garamond',serif;font-size:0.95rem;letter-spacing:0.4em;color:var(--gold);text-decoration:none;text-transform:uppercase}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{color:var(--white);text-decoration:none;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0.45;transition:all .3s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{opacity:1;color:var(--gold)}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 25%,#1c1c40 0%,#0a0a1e 55%,#040408 100%)}
.stars{position:absolute;inset:0;pointer-events:none;background-image:
  radial-gradient(1px 1px at 8% 15%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 68%,rgba(255,255,255,.35) 0%,transparent 100%),
  radial-gradient(1px 1px at 38% 8%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 52%,rgba(201,168,76,.7) 0%,transparent 100%),
  radial-gradient(1px 1px at 72% 28%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 85% 75%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 14% 88%,rgba(255,255,255,.45) 0%,transparent 100%),
  radial-gradient(1px 1px at 91% 12%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 47% 82%,rgba(201,168,76,.5) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 63% 41%,rgba(255,255,255,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 3% 45%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 77% 60%,rgba(255,255,255,.4) 0%,transparent 100%)}
.orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:550px;height:550px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.065) 0%,transparent 65%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.12);opacity:1}}
.hero-inner{position:relative;z-index:2;padding:2rem;max-width:680px}
.eyebrow{font-size:.58rem;letter-spacing:.65em;text-transform:uppercase;color:var(--gold);opacity:.65;display:block;margin-bottom:1.8rem}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:300;font-style:italic;line-height:1.12;margin-bottom:.6rem}
.hero h1 em{color:var(--gold)}
.hero-sub{font-size:.62rem;letter-spacing:.45em;opacity:.3;text-transform:uppercase;margin-bottom:3rem}
.tab-switcher{display:flex;border:1px solid rgba(201,168,76,.22);border-radius:40px;overflow:hidden;margin:0 auto}
.ts-btn{padding:.7rem 2.2rem;background:transparent;border:none;color:var(--white);font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .3s;opacity:.45}
.ts-btn:hover{opacity:.8;background:rgba(201,168,76,.08)}
.ts-btn.active{background:var(--gold);color:var(--dark);opacity:1;font-weight:400}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:.3;animation:sh 2.8s ease-in-out infinite}
@keyframes sh{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
.scroll-hint span{font-size:.52rem;letter-spacing:.4em;text-transform:uppercase}
.scroll-hint::after{content:'';width:1px;height:38px;background:var(--gold);display:block}

/* TABS */
.tab-panel{display:none}.tab-panel.active{display:block}

/* SECTIONS */
.sec{padding:7rem 2rem;max-width:1060px;margin:0 auto}
.sec-alt{padding:7rem 2rem;background:var(--dark2);border-top:1px solid rgba(201,168,76,.07);border-bottom:1px solid rgba(201,168,76,.07)}
.sec-alt-in{max-width:1060px;margin:0 auto}
.label{font-size:.52rem;letter-spacing:.55em;text-transform:uppercase;color:var(--gold);opacity:.6;display:block;margin-bottom:.7rem}
h2{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:300;font-style:italic;line-height:1.2;margin-bottom:.5rem}
h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;font-style:italic;color:var(--gold-light);margin-bottom:.6rem}
p{line-height:1.95;opacity:.62;font-size:.87rem;margin-bottom:.9rem}
.line{width:55px;height:1px;background:var(--gold);opacity:.35;margin:1.4rem 0}

/* SIGNATURE CARD */
.sig-card{background:linear-gradient(135deg,rgba(18,18,38,.97),rgba(7,7,18,.99));border:1px solid rgba(201,168,76,.18);border-radius:22px;padding:3.5rem 2rem;text-align:center;position:relative;overflow:hidden;margin-bottom:2.5rem}
.sig-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.07) 0%,transparent 55%);pointer-events:none}
.kin-label{font-size:.55rem;letter-spacing:.65em;text-transform:uppercase;color:var(--gold);opacity:.55;display:block;margin-bottom:.4rem}
.kin-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;margin-bottom:.3rem}
.kin-date{font-size:.62rem;letter-spacing:.35em;opacity:.3;text-transform:uppercase;margin-bottom:2.5rem}

/* GALACTIC CROSS */
.cross{display:grid;grid-template-areas:'. guide .' 'anti dest ana' '. occ .';gap:1.1rem;margin:0 auto;max-width:400px}
.ci{display:flex;flex-direction:column;align-items:center;gap:.35rem}
.ci.guide{grid-area:guide}.ci.anti{grid-area:anti}.ci.dest{grid-area:dest}.ci.ana{grid-area:ana}.ci.occ{grid-area:occ}
.seal{width:70px;height:70px;border-radius:11px;background:rgba(25,25,48,.9);border:1px solid rgba(201,168,76,.22);display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all .3s;cursor:default}
.ci.dest .seal{width:90px;height:90px;font-size:2.4rem;border-color:rgba(201,168,76,.5);box-shadow:0 0 28px rgba(201,168,76,.18)}
.ci-lbl{font-size:.46rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);opacity:.5}
.ci-nm{font-size:.7rem;opacity:.72;text-align:center;max-width:80px;line-height:1.3}

/* MANTRA */
.mantra{border-left:2px solid var(--gold);padding:1.4rem 1.8rem;background:rgba(201,168,76,.04);border-radius:0 10px 10px 0;margin:2rem 0}
.m-lbl{font-size:.48rem;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);opacity:.55;display:block;margin-bottom:.75rem}
.m-txt{font-family:'Cormorant Garamond',serif;font-size:1.12rem;font-style:italic;line-height:1.9;opacity:.88}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:.75rem;margin:2rem 0;justify-content:center}
.chip{padding:.42rem 1rem;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);border-radius:40px;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase}
.chip b{color:var(--gold);margin-right:.3rem}

/* ALTER EGO CARDS */
.ae-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.4rem;margin-top:2.5rem}
.ae-card{background:rgba(18,18,36,.75);border:1px solid rgba(201,168,76,.1);border-radius:14px;padding:2rem;transition:all .3s}
.ae-card:hover{border-color:rgba(201,168,76,.35);transform:translateY(-3px)}
.ae-icon{font-size:2.2rem;margin-bottom:.9rem;display:block}
.ae-role{font-size:.48rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);opacity:.55;display:block;margin-bottom:.35rem}

/* SIGILL DEEP */
.sigill-list{display:flex;flex-direction:column;gap:2.8rem;margin-top:2.5rem}
.si{display:grid;grid-template-columns:90px 1fr;gap:1.8rem;align-items:start}
.si-icon{width:82px;height:82px;border-radius:12px;background:rgba(25,25,50,.9);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:2.4rem;flex-shrink:0}
.si-pos{font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);opacity:.5;display:block;margin-bottom:.25rem}
.si-tags{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.7rem}
.si-tag{font-size:.56rem;padding:.18rem .65rem;border:1px solid rgba(201,168,76,.2);border-radius:30px;color:var(--gold-light);opacity:.7}

/* ACTION CARDS */
.action-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.2rem;margin-top:2rem}
.action-card{background:rgba(14,14,28,.8);border:1px solid rgba(201,168,76,.1);border-radius:12px;padding:1.8rem;transition:all .3s}
.action-card:hover{border-color:rgba(201,168,76,.3)}
.a-num{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:var(--gold);opacity:.25;line-height:1;margin-bottom:.5rem}

/* MAMMA CARD */
.mamma-card{background:linear-gradient(135deg,rgba(20,14
