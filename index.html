<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inre Spegel</title>
  <meta name="description" content="Inre Spegel – en plats för själslig reflektion, galaktisk symbolik och jordad närvaro." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f0f12;
      --bg-soft: #16161b;
      --panel: #1d1d24;
      --panel-2: #252530;
      --text: #f3efe7;
      --muted: #b9b1a4;
      --line: rgba(255,255,255,0.08);
      --gold: #c8a96b;
      --gold-soft: #8f7650;
      --accent: #9fb7b9;
      --danger: #c57f7f;
      --shadow: 0 10px 30px rgba(0,0,0,0.35);
      --radius: 18px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(200,169,107,0.08), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(159,183,185,0.08), transparent 25%),
        var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(100% - 32px, var(--max));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(15,15,18,0.75);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 76px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: "Cormorant Garamond", serif;
      letter-spacing: 0.06em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(200,169,107,0.35);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      box-shadow: inset 0 0 24px rgba(200,169,107,0.08);
      font-size: 1.1rem;
    }

    .brand span {
      font-size: 1.6rem;
    }

    nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.25s ease;
    }

    nav a:hover {
      color: var(--text);
    }

    .hero {
      padding: 88px 0 56px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-card,
    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 42px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 26px;
      height: 1px;
      background: rgba(200,169,107,0.55);
    }

    h1, h2, h3 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", serif;
      line-height: 1.05;
      letter-spacing: 0.01em;
    }

    h1 {
      font-size: clamp(3rem, 6vw, 5.4rem);
      max-width: 10ch;
    }

    .lead {
      font-size: 1.06rem;
      color: var(--muted);
      max-width: 62ch;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 500;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #111;
    }

    .btn-primary:hover {
      background: #d7b67a;
      transform: translateY(-1px);
    }

    .btn-secondary {
      border-color: var(--line);
      color: var(--text);
      background: rgba(255,255,255,0.02);
    }

    .btn-secondary:hover {
      border-color: rgba(200,169,107,0.25);
      background: rgba(255,255,255,0.04);
    }

    .panel {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .quote {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.55rem;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 18px;
    }

    .small {
      color: var(--muted);
      font-size: 0.95rem;
    }

    section {
      padding: 24px 0 72px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
